# CI workflow that:
# 1) runs each JMeter thread group separately,
# 2) publishes dashboards to GitHub Pages,
# 3) sends a Slack report with summary metrics.
name: JMeter Thread Groups and Pages

on:
  # Allow manual runs from the Actions UI.
  workflow_dispatch:
  # Auto-run on pushes to primary branches.
  push:
    branches:
      - main
      - master

# Required permissions for checkout, Pages deployment, and OIDC token usage.
permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one Pages deployment pipeline runs at a time for this repo.
concurrency:
  group: jmeter-pages
  cancel-in-progress: false

jobs:
  # Matrix job: run JMeter once per thread-group profile.
  run-thread-groups:
    runs-on: ubuntu-latest
    strategy:
      # Run one profile at a time; parallel execution overloads the target and
      # makes CI results non-comparable with local single-profile runs.
      max-parallel: 1
      fail-fast: false
      matrix:
        # Define all thread groups that should be executed in CI.
        include:
          - id: TG1
            slug: baseline
            label: Baseline
          - id: TG2
            slug: load
            label: Load
          - id: TG3
            slug: peak-load
            label: Peak Load
          - id: TG4
            slug: stress
            label: Stress
          - id: TG5
            slug: endurance
            label: Endurance

    steps:
      # Pull repository files (JMX, scripts, etc.) into the runner.
      - name: Checkout
        uses: actions/checkout@v4

      # JMeter requires Java runtime.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Install a fixed JMeter version for reproducible runs.
      - name: Install JMeter
        run: |
          curl -fsSL https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -o jmeter.tgz
          tar -xzf jmeter.tgz

      # Generate a JMX copy where only the current matrix thread group is enabled.
      - name: Prepare JMX for selected thread group
        run: |
          mkdir -p generated
          python3 scripts/prepare_jmx_single_group.py \
            --input Performance_Testing_DemoBlaze_v16.jmx \
            --output generated/${{ matrix.slug }}.jmx \
            --thread-group-id ${{ matrix.id }}

      # Execute non-GUI JMeter test and build HTML dashboard output.
      - name: Run JMeter for ${{ matrix.label }}
        id: jmeter_run
        run: |
          mkdir -p results/${{ matrix.slug }}
          # Capture JMeter exit code manually so later steps can still run.
          set +e
          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t generated/${{ matrix.slug }}.jmx \
            -l results/${{ matrix.slug }}/${{ matrix.slug }}_results.jtl \
            -e \
            -o results/${{ matrix.slug }}/${{ matrix.slug }}_dashboard
          rc=$?
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      # Parse JTL and compute quality-gate metrics used by reporting and pass/fail.
      - name: Build metrics for ${{ matrix.label }}
        id: metrics
        env:
          THREAD_GROUP_ID: ${{ matrix.id }}
          THREAD_GROUP_LABEL: ${{ matrix.label }}
          THREAD_GROUP_SLUG: ${{ matrix.slug }}
          JMETER_EXIT_CODE: ${{ steps.jmeter_run.outputs.exit_code }}
        run: |
          mkdir -p metrics
          python3 - <<'PY'
          import csv
          import json
          import os
          from pathlib import Path

          tg_id = os.environ["THREAD_GROUP_ID"]
          tg_label = os.environ["THREAD_GROUP_LABEL"]
          tg_slug = os.environ["THREAD_GROUP_SLUG"]
          jmeter_exit_code = int(os.environ.get("JMETER_EXIT_CODE", "1"))
          jtl_path = Path(f"results/{tg_slug}/{tg_slug}_results.jtl")

          total = 0
          failed = 0
          elapsed_sum = 0.0

          if jtl_path.exists() and jtl_path.stat().st_size > 0:
              with jtl_path.open("r", encoding="utf-8", newline="") as fh:
                  reader = csv.DictReader(fh)
                  for row in reader:
                      total += 1
                      success = str(row.get("success", "")).strip().lower() == "true"
                      if not success:
                          failed += 1
                      try:
                          elapsed_sum += float(row.get("elapsed", 0) or 0)
                      except ValueError:
                          elapsed_sum += 0.0

          avg_ms = (elapsed_sum / total) if total > 0 else 0.0
          error_rate = ((failed / total) * 100.0) if total > 0 else 100.0
          status = "PASS" if jmeter_exit_code == 0 and failed == 0 and total > 0 else "FAIL"

          payload = {
              "thread_group_id": tg_id,
              "thread_group_label": tg_label,
              "thread_group_slug": tg_slug,
              "jmeter_exit_code": jmeter_exit_code,
              "status": status,
              "total_samples": total,
              "failed_samples": failed,
              "error_rate_percent": round(error_rate, 2),
              "avg_response_time_ms": round(avg_ms, 2),
          }

          out_file = Path(f"metrics/{tg_slug}.json")
          out_file.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print(f"Wrote {out_file}")
          PY

          status=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('metrics/${{ matrix.slug }}.json').read_text(encoding='utf-8'))
          print(data.get('status', 'FAIL'))
          PY
          )
          echo "status=$status" >> "$GITHUB_OUTPUT"

      # Stage dashboard files so they can be merged into a single Pages site later.
      - name: Prepare Pages content for ${{ matrix.label }}
        run: |
          mkdir -p pages/${{ matrix.slug }}
          cp -R results/${{ matrix.slug }}/${{ matrix.slug }}_dashboard/. pages/${{ matrix.slug }}/

      # Upload per-thread-group dashboard artifact.
      - name: Upload dashboard artifact for ${{ matrix.label }}
        uses: actions/upload-artifact@v4
        with:
          name: pages-${{ matrix.slug }}
          path: pages/${{ matrix.slug }}
          if-no-files-found: error

      # Upload per-thread-group metrics artifact for Slack summary.
      - name: Upload metrics artifact for ${{ matrix.label }}
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.slug }}
          path: metrics/${{ matrix.slug }}.json
          if-no-files-found: error

      # Enforce quality gate at matrix-job level.
      - name: Fail job when thread group does not pass
        if: steps.metrics.outputs.status != 'PASS'
        run: |
          echo "Thread group ${{ matrix.label }} failed quality gate."
          exit 1

  # Deploy combined dashboards to GitHub Pages.
  deploy-pages:
    runs-on: ubuntu-latest
    needs: run-thread-groups
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Initialize Pages deployment settings for this run.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Retrieve all dashboard artifacts produced by the matrix job.
      - name: Download all dashboard artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: pages-*

      # Build a simple landing page and copy each dashboard under its slug path.
      - name: Build Pages site
        run: |
          mkdir -p _site

          for artifact_dir in _artifacts/pages-*; do
            slug="${artifact_dir##*/pages-}"
            mkdir -p "_site/$slug"
            cp -R "$artifact_dir/." "_site/$slug/"
          done

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>JMeter Dashboards</title>
            <style>
              :root { color-scheme: light; }
              body {
                margin: 0;
                padding: 2rem;
                font-family: "Segoe UI", Tahoma, sans-serif;
                background: #f5f7fa;
                color: #1b1f24;
              }
              .card {
                max-width: 720px;
                margin: 0 auto;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
                padding: 1.5rem;
              }
              h1 { margin-top: 0; }
              ul { line-height: 2; }
              a { color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <main class="card">
              <h1>JMeter Thread Group Dashboards</h1>
              <p>Select a dashboard:</p>
              <ul>
                <li><a href="./baseline/index.html">Baseline</a></li>
                <li><a href="./load/index.html">Load</a></li>
                <li><a href="./peak-load/index.html">Peak Load</a></li>
                <li><a href="./stress/index.html">Stress</a></li>
                <li><a href="./endurance/index.html">Endurance</a></li>
              </ul>
            </main>
          </body>
          </html>
          HTML

      # Upload static site bundle to GitHub Pages artifact storage.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Publish artifact to the github-pages environment.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Always notify Slack, regardless of success/failure, with links and metrics.
  notify-slack:
    runs-on: ubuntu-latest
    needs:
      - run-thread-groups
      - deploy-pages
    if: always()

    steps:
      # Build and send a rich Slack message with per-group KPIs.
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}
          DEPLOY_RESULT: ${{ needs.deploy-pages.result }}
          RUN_TG_RESULT: ${{ needs.run-thread-groups.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping Slack notification."
            exit 0
          fi

          mkdir -p _metrics

          # Download metrics artifacts from the same workflow run.
          # gh is preinstalled on GitHub-hosted runners.
          echo "Downloading metrics artifacts..."
          gh run download "${{ github.run_id }}" -R "${{ github.repository }}" --name metrics-baseline --dir _metrics/metrics-baseline || true
          gh run download "${{ github.run_id }}" -R "${{ github.repository }}" --name metrics-load --dir _metrics/metrics-load || true
          gh run download "${{ github.run_id }}" -R "${{ github.repository }}" --name metrics-peak-load --dir _metrics/metrics-peak-load || true
          gh run download "${{ github.run_id }}" -R "${{ github.repository }}" --name metrics-stress --dir _metrics/metrics-stress || true
          gh run download "${{ github.run_id }}" -R "${{ github.repository }}" --name metrics-endurance --dir _metrics/metrics-endurance || true

          python3 - <<'PY' > payload.json
          import json
          import os
          from pathlib import Path

          deploy_result = os.getenv("DEPLOY_RESULT", "unknown")
          run_tg_result = os.getenv("RUN_TG_RESULT", "unknown")
          pages_url = os.getenv("PAGES_URL", "")
          run_url = os.getenv("RUN_URL", "")

          overall_result = "success" if deploy_result == "success" and run_tg_result == "success" else "failure"

          if overall_result == "success":
              text = "JMeter workflow succeeded. Dashboards are live on GitHub Pages."
              status_emoji = ":white_check_mark:"
          else:
              text = "JMeter workflow failed. Check the GitHub Actions run for details."
              status_emoji = ":x:"

          groups = [
              ("baseline", "Baseline"),
              ("load", "Load"),
              ("peak-load", "Peak Load"),
              ("stress", "Stress"),
              ("endurance", "Endurance"),
          ]

          metrics_rows = []
          # Monospace rows to mimic a compact table in Slack markdown.
          metrics_rows.append("Thread Group | Status | Error % | Avg ms | Samples | Failed")
          metrics_rows.append("------------|--------|---------|--------|---------|-------")

          for slug, label in groups:
              metrics_path = Path(f"_metrics/metrics-{slug}/{slug}.json")
              if not metrics_path.exists():
                  metrics_rows.append(f"{label:<11} | FAIL   | n/a     | n/a    | n/a     | n/a")
                  continue

              data = json.loads(metrics_path.read_text(encoding="utf-8"))
              status = data.get("status", "FAIL")
              error_rate = data.get("error_rate_percent", 100.0)
              avg_ms = data.get("avg_response_time_ms", 0.0)
              total = data.get("total_samples", 0)
              failed = data.get("failed_samples", 0)

              metrics_rows.append(
                  f"{label:<11} | {status:<6} | {error_rate:>6.2f}% | {avg_ms:>6.2f} | {total:>7} | {failed:>6}"
              )

          context_parts = []
          if pages_url:
              context_parts.append(f"<{pages_url}|GitHub Pages>")
          if run_url:
              context_parts.append(f"<{run_url}|Workflow Run>")

          blocks = [
              {
                  "type": "header",
                  "text": {
                      "type": "plain_text",
                      "text": "JMeter Thread Group Report",
                      "emoji": True,
                  },
              },
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"{status_emoji} *{text}*",
                  },
              },
          ]

          if context_parts:
              blocks.append(
                  {
                      "type": "context",
                      "elements": [
                          {
                              "type": "mrkdwn",
                              "text": " | ".join(context_parts),
                          }
                      ],
                  }
              )

          blocks.extend(
              [
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": "*Per-thread-group metrics*\n```" + "\n".join(metrics_rows) + "```",
                      },
                  },
              ]
          )

          payload = {
              "text": text,
              "blocks": blocks,
          }

          print(json.dumps(payload))
          PY

          curl -sS -X POST \
            -H 'Content-type: application/json' \
            --data @payload.json \
            "${SLACK_WEBHOOK_URL}"
